<html>
  <head>
    <title>user action</title>
  </head>
  <body>
    <video id="video" style="width: 1000px; height: 500px;" src="xxx.mp4" ></video>
    <button id="playButton" style="width: 40%; height: 20%;" >play</button>
    <script>
      let button = document.getElementById("playButton");
      let video = document.getElementById("video");
      button.addEventListener("click", function() {
        video.play();
      })
    </script>
  </body>
</html>
